name: expense_tracker
description: Simple daily expense logger with SMS and Gmail integration
publish_to: none
version: 2.0.0+4
environment:
  sdk: '>=3.9.0 <4.0.0'
dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  dio: ^5.7.0
  http: ^1.2.2
  flutter_secure_storage: ^9.2.2
  fl_chart: ^1.0.0
  flutter_local_notifications: ^17.2.1
  timezone: ^0.9.4
  flutter_sms_inbox: ^1.0.3
  google_sign_in: ^6.2.1
  googleapis: ^13.0.0
  permission_handler: ^11.3.1
  flutter_widget_from_html_core: ^0.15.1
  flutter_dotenv: ^5.2.1
  intl: ^0.20.2
  cupertino_icons: ^1.0.8
  flutter_native_splash: ^2.4.4
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3
flutter:
  uses-material-design: true
  assets:
    - assets/branding/
    - .env
flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/branding/app_icon.png
  adaptive_icon_background: '#4361EE'
  adaptive_icon_foreground: assets/branding/app_icon.png
  remove_alpha_ios: true
flutter_native_splash:
  color: '#F5F6FA'
  android_12:
    color: '#F5F6FA'
  ios: true
  android: true
  web: false
